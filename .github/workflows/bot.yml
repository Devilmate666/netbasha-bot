name: Netbasha Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'  # restart every 5 hours

# Prevent two runs from executing at the same time (avoids double notifications)
concurrency:
  group: bot-run
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: /tmp/bot_state.json
          key: bot-state-v1
          restore-keys: |
            bot-state-v1

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: timeout 17000 python bot.py || true

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/bot_state.json
          key: bot-state-v1-${{ github.run_id }}
